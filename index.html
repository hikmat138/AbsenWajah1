<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi SDNRT</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
   <style>
    body { 
        font-family: 'Segoe UI', sans-serif; 
        text-align: center; 
        background: #f0f2f5; 
        margin: 0; 
        padding: 0; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
    }
    
    /* Wrapper untuk memusatkan area scan */
    #scan-section { 
        display: none; 
        width: 100%; 
        max-width: 640px; 
        margin: 20px auto; 
    }

    /* Kontainer video agar berada di tengah */
    #container { 
        position: relative; 
        width: 100%; 
        max-width: 640px; 
        margin: 0 auto; /* Menengahkan ke kiri & kanan */
        border: 5px solid #333; 
        border-radius: 10px; 
        overflow: hidden; 
        background-color: #000;
        line-height: 0; /* Menghilangkan celah bawah video */
    }

    video { 
        width: 100%; 
        height: auto; 
        display: block; 
    }

    canvas { 
        position: absolute; 
        top: 0; 
        left: 0; 
    }

    #status-box { 
        margin: 20px auto; 
        padding: 15px; 
        border-radius: 8px; 
        background: white; 
        width: 90%; 
        max-width: 500px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    }
    
    /* Tombol-tombol menu */
    .menu-container { 
        display: flex; 
        flex-direction: column; 
        gap: 20px; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
    }
</style>
</head>
<body>

    <div id="home-section" class="menu-container">
        <h1>SISTEM ABSENSI SDNRT</h1>
        <button class="btn-scan" onclick="showScan()">📸 MULAI SCAN WAJAH</button>
        <button class="btn-admin" onclick="alert('Halaman Admin sedang dikembangkan. Silakan login via Spreadsheet.')">🔐 LOGIN ADMIN</button>
    </div>

    <div id="scan-section">
        <button onclick="location.reload()" style="width: auto; background: #e74c3c; color: white; margin-bottom: 10px;">⬅ KEMBALI</button>
        <div id="container">
            <video id="video" width="640" height="480" autoplay muted></video>
        </div>
        <div id="status-box">
            <div id="loader">Menyiapkan AI...</div>
            <div id="info" style="font-weight: bold; font-size: 1.2em; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');
        const info = document.getElementById('info');
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwTDUsSarnUUVADzQTqleRr82x9z9xyTQxV3fap1E621CzCoCU3F0sCPUEhDwd-RnLr/exec"; // GANTI DENGAN URL EXEC ANDA

        let studentNames = {}; // Untuk simpan mapping NISN -> Nama
        let faceMatcher;
        let isProcessing = false;

        function showScan() {
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('scan-section').style.display = 'block';
            init();
        }

        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            loadStudentData();
        }

        async function loadStudentData() {
            loader.innerText = "Sinkronisasi Database...";
            const response = await fetch(URL_GAS);
            const students = await response.json();

            const labeledFaceDescriptors = await Promise.all(
                students.map(async (student) => {
                    studentNames[student.nisn] = student.nama; // Simpan nama di memori
                    try {
                        const img = await faceapi.fetchImage(student.foto);
                        const fullFaceDescription = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        if (!fullFaceDescription) return null;
                        return new faceapi.LabeledFaceDescriptors(student.nisn.toString(), [fullFaceDescription.descriptor]);
                    } catch (e) { return null; }
                })
            );

            const filteredDescriptors = labeledFaceDescriptors.filter(d => d !== null);
            faceMatcher = new faceapi.FaceMatcher(filteredDescriptors, 0.6);
            loader.className = "ready";
            loader.innerText = "SISTEM SIAP!";
            startRecognition();
        }

        function startRecognition() {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('container').append(canvas);
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                resizedDetections.forEach(async (detection) => {
                    const result = faceMatcher.findBestMatch(detection.descriptor);
                    
                    // GANTI NISN JADI NAMA DI FRAME
                    const nisn = result.label;
                    const namaTampil = studentNames[nisn] || "Tidak Dikenal";
                    const drawBox = new faceapi.draw.DrawBox(detection.detection.box, { label: namaTampil });
                    drawBox.draw(canvas);
                    
                    if (nisn !== 'unknown' && !isProcessing) {
                        prosesAbsensi(nisn, namaTampil);
                    }
                });
            }, 1000);
        }

        async function prosesAbsensi(nisn, nama) {
            isProcessing = true;
            info.innerText = "Mencatat: " + nama + "...";
            
            try {
                const resp = await fetch(URL_GAS, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ nisn: nisn })
                });

                info.innerHTML = `<span style="color:green">✅ ${nama} Berhasil!</span>`;
                setTimeout(() => { isProcessing = false; info.innerText = ""; }, 5000);
            } catch (err) {
                isProcessing = false;
            }
        }
    </script>
</body>
</html>
