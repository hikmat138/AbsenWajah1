<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi SDNRT</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .menu-container { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            width: 100%;
        }

        h1 { color: #2c3e50; margin-bottom: 30px; }

        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            border: none; 
            border-radius: 50px; 
            width: 280px; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            font-weight: bold;
        }

        .btn-scan { background: #27ae60; color: white; }
        .btn-scan:hover { background: #219150; transform: scale(1.05); }
        .btn-admin { background: #2980b9; color: white; }
        .btn-admin:hover { background: #2471a3; transform: scale(1.05); }

        #scan-section { 
            display: none; 
            width: 100%; 
            max-width: 640px; 
            margin: 20px auto; 
        }

        #container { 
            position: relative; 
            width: 100%; 
            margin: 0 auto; 
            border: 5px solid #333; 
            border-radius: 10px; 
            overflow: hidden; 
            background-color: #000;
            line-height: 0;
        }

        video { width: 100%; height: auto; display: block; }
        canvas { position: absolute; top: 0; left: 0; }

        #status-box { 
            margin: 20px auto; 
            padding: 15px; 
            border-radius: 8px; 
            background: white; 
            width: 90%; 
            max-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        .ready { color: #27ae60; font-weight: bold; }
        .loading { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home-section" class="menu-container">
        <h1>SISTEM ABSENSI SDNRT</h1>
        <button class="btn-scan" onclick="showScan()">📸 MULAI SCAN WAJAH</button>
        <button class="btn-admin" onclick="window.location.href='admin.html'">🔐 LOGIN ADMIN</button>
    </div>

    <div id="scan-section">
        <button onclick="location.reload()" style="width: auto; background: #e74c3c; color: white; margin-bottom: 15px; border-radius: 10px; padding: 10px 20px;">⬅ KEMBALI</button>
        <div id="container">
            <video id="video" width="640" height="480" autoplay muted playsinline></video>
        </div>
        <div id="status-box">
            <div id="loader" class="loading">Menyiapkan AI & Database...</div>
            <div id="info" style="font-weight: bold; font-size: 1.2em; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');
        const info = document.getElementById('info');
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwTDUsSarnUUVADzQTqleRr82x9z9xyTQxV3fap1E621CzCoCU3F0sCPUEhDwd-RnLr/exec";

        let studentNames = {}; 
        let studentStatus = {}; 
        let faceMatcher;
        let isProcessing = false;

        function showScan() {
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('scan-section').style.display = 'block';
            init();
        }

        async function init() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                loadStudentData();
            } catch (err) {
                loader.innerText = "Kamera/AI Gagal: " + err;
            }
        }

        async function loadStudentData() {
            loader.innerText = "Sinkronisasi Database Murid...";
            try {
                const response = await fetch(URL_GAS);
                const students = await response.json();

                const labeledFaceDescriptors = await Promise.all(
                    students.map(async (student) => {
                        studentNames[student.nisn] = student.nama;
                        studentStatus[student.nisn] = student.statusHariIni; 
                        try {
                            const img = await faceapi.fetchImage(student.foto);
                            const fullFaceDescription = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                            if (!fullFaceDescription) return null;
                            return new faceapi.LabeledFaceDescriptors(student.nisn.toString(), [fullFaceDescription.descriptor]);
                        } catch (e) { return null; }
                    })
                );

                const filteredDescriptors = labeledFaceDescriptors.filter(d => d !== null);
                faceMatcher = new faceapi.FaceMatcher(filteredDescriptors, 0.4);
                loader.className = "ready";
                loader.innerText = "SISTEM SIAP! Silakan menghadap kamera.";
                startRecognition();
            } catch (err) {
                loader.innerText = "Gagal memuat database.";
            }
        }

        function startRecognition() {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('container').append(canvas);
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                resizedDetections.forEach(async (detection) => {
                    const result = faceMatcher.findBestMatch(detection.descriptor);
                    const nisn = result.label;
                    
                    if (nisn !== 'unknown') {
                        const nama = studentNames[nisn];
                        const status = studentStatus[nisn];
                        
                        // Logika tampilan label dan warna kotak
                        const labelTampil = status === "Sudah Absen" ? `${nama} (SUDAH ABSEN)` : nama;
                        const warnaKotak = status === "Sudah Absen" ? '#e74c3c' : '#2ecc71';

                        const drawBox = new faceapi.draw.DrawBox(detection.detection.box, { 
                            label: labelTampil, 
                            boxColor: warnaKotak 
                        });
                        drawBox.draw(canvas);
                        
                        if (!isProcessing && status !== "Sudah Absen") {
                            prosesAbsensi(nisn, nama);
                        }
                    } else {
                        new faceapi.draw.DrawBox(detection.detection.box, { label: "Tidak Dikenal", boxColor: 'gray' }).draw(canvas);
                    }
                });
            }, 1000);
        }

        async function prosesAbsensi(nisn, nama) {
            isProcessing = true;
            info.innerText = "Mencatat kehadiran: " + nama + "...";
            
            try {
                await fetch(URL_GAS, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ nisn: nisn })
                });

                info.innerHTML = `<span style="color:#27ae60">✅ ${nama} Berhasil!</span>`;
                studentStatus[nisn] = "Sudah Absen"; // Update status lokal
                
                setTimeout(() => { 
                    isProcessing = false; 
                    info.innerText = ""; 
                }, 5000);
            } catch (err) {
                isProcessing = false;
                info.innerText = "Gagal mengirim data.";
            }
        }
    </script>
</body>
</html>
