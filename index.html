<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Wajah SDNRT</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        #container { position: relative; border: 5px solid #333; border-radius: 10px; overflow: hidden; }
        video { display: block; }
        canvas { position: absolute; top: 0; left: 0; }
        #status-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: white; width: 80%; max-width: 500px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loading { color: #e67e22; font-weight: bold; }
        .ready { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Presensi Wajah Murid</h2>
    
    <div id="container">
        <video id="video" width="640" height="480" autoplay muted></video>
    </div>

    <div id="status-box">
        <div id="loader" class="loading">Menunggu Library Face-API...</div>
        <div id="info"></div>
    </div>

    <script>
    const video = document.getElementById('video');
    const loader = document.getElementById('loader');
    const info = document.getElementById('info');
    const URL_GAS = "https://script.google.com/macros/s/AKfycbwTDUsSarnUUVADzQTqleRr82x9z9xyTQxV3fap1E621CzCoCU3F0sCPUEhDwd-RnLr/exec";

    let labeledFaceDescriptors = [];
    let faceMatcher;
    let isProcessing = false;

    // 1. Cek Library
    async function checkLibrary() {
        if (typeof faceapi !== 'undefined') {
            init();
        } else {
            setTimeout(checkLibrary, 500);
        }
    }

    // 2. Inisialisasi Model & Kamera
    async function init() {
        try {
            loader.innerText = "Memuat Model AI...";
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            video.srcObject = stream;
            
            // Panggil fungsi muat data murid
            await loadStudentData();
        } catch (err) {
            loader.innerText = "Gagal memuat: " + err;
        }
    }

    // 3. Ambil Data Murid dari Spreadsheet (doGet)
    async function loadStudentData() {
        try {
            loader.innerText = "Sinkronisasi Wajah Murid...";
            const response = await fetch(URL_GAS);
            const students = await response.json();

            labeledFaceDescriptors = await Promise.all(
                students.map(async (student) => {
                    try {
                        const img = await faceapi.fetchImage(student.foto);
                        const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        if (!detections) return null;
                        return new faceapi.LabeledFaceDescriptors(student.nisn.toString(), [detections.descriptor]);
                    } catch (e) {
                        return null;
                    }
                })
            );

            labeledFaceDescriptors = labeledFaceDescriptors.filter(d => d !== null);
            
            if (labeledFaceDescriptors.length === 0) {
                loader.innerText = "Error: Tidak ada data wajah valid di Drive.";
                return;
            }

            faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.6);
            loader.className = "ready";
            loader.innerText = "SISTEM SIAP!";
            startRecognition();
        } catch (err) {
            loader.innerText = "Gagal ambil data murid: " + err;
        }
    }

    // 4. Deteksi Real-time
    function startRecognition() {
        const canvas = faceapi.createCanvasFromMedia(video);
        document.getElementById('container').append(canvas);
        const displaySize = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

            resizedDetections.forEach(async (detection) => {
                const result = faceMatcher.findBestMatch(detection.descriptor);
                const label = result.toString();
                
                if (!result.label.includes("unknown") && !isProcessing) {
                    prosesAbsensi(result.label);
                }
                new faceapi.draw.DrawBox(detection.detection.box, { label }).draw(canvas);
            });
        }, 1000);
    }

    // 5. Kirim ke Spreadsheet (doPost)
    async function prosesAbsensi(nisn) {
        isProcessing = true;
        info.innerHTML = `Mengenali NISN: ${nisn}...`;
        try {
            await fetch(URL_GAS, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ nisn: nisn })
            });
            info.innerHTML = "BERHASIL DICATAT!";
            setTimeout(() => { isProcessing = false; info.innerHTML = ""; }, 5000);
        } catch (err) {
            isProcessing = false;
        }
    }

    checkLibrary();
</script>
</body>
</html>
