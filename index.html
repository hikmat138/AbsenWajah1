<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Wajah SDNRT</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        #container { position: relative; border: 5px solid #333; border-radius: 10px; overflow: hidden; }
        video { display: block; }
        canvas { position: absolute; top: 0; left: 0; }
        #status-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: white; width: 80%; max-width: 500px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loading { color: #e67e22; font-weight: bold; }
        .ready { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Presensi Wajah Murid</h2>
    
    <div id="container">
        <video id="video" width="640" height="480" autoplay muted></video>
    </div>

    <div id="status-box">
        <div id="loader" class="loading">Menunggu Library Face-API...</div>
        <div id="info"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');
        const info = document.getElementById('info');
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwTDUsSarnUUVADzQTqleRr82x9z9xyTQxV3fap1E621CzCoCU3F0sCPUEhDwd-RnLr/exec";

        // Fungsi pengecekan apakah faceapi sudah siap
        async function checkLibrary() {
            if (typeof faceapi !== 'undefined') {
                console.log("Face-API siap!");
                init();
            } else {
                console.log("Menunggu Face-API...");
                setTimeout(checkLibrary, 500); // Cek lagi tiap 0.5 detik
            }
        }

        async function init() {
            try {
                loader.innerText = "Memuat Model AI (SSD Mobilenet)...";
                // Menggunakan model dari CDN yang lebih stabil
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                
                loadStudentData();
            } catch (err) {
                loader.innerText = "Gagal memuat: " + err;
            }
        }

        // ... Sisa fungsi loadStudentData, startRecognition, dan prosesAbsensi sama seperti sebelumnya ...
        // (Pastikan fungsi-fungsi tersebut tetap ada di dalam tag <script> ini)

        // Jalankan pengecekan pertama kali
        checkLibrary();
    </script>
</body>
</html>
