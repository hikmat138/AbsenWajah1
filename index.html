<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Kelas 3A SDN Ranca Tales</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Menu Utama Modern */
        .menu-container { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .main-card { background: white; padding: 40px 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .main-card h1 { font-size: 22px; color: #2c3e50; margin-bottom: 25px; border-bottom: 3px solid #27ae60; padding-bottom: 10px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn-main { padding: 18px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; border: none; }
        .btn-scan-wajah { background: #27ae60; color: white; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); }
        .btn-admin-login { background: #2c3e50; color: white; }
        .school-footer { margin-top: 25px; font-size: 13px; color: #7f8c8d; font-style: italic; }

        /* Bagian Scan */
        #scan-section { display: none; width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        .btn-back { background: #e74c3c; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; margin-bottom: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        #container { 
            position: relative; 
            width: 100%; 
            border: 4px solid #333; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        /* EFEK CERMIN AGAR TIDAK BINGUNG */
        video { width: 100%; height: auto; display: block; transform: scaleX(-1); -webkit-transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); -webkit-transform: scaleX(-1); }

        #status-box { margin-top: 15px; padding: 15px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="home-section" class="menu-container">
        <div class="main-card">
            <h1>SISTEM ABSENSI<br><span style="color:#27ae60;">KELAS 3A</span></h1>
            <div class="btn-group">
                <button class="btn-main btn-scan-wajah" onclick="showScan()">📸 MULAI SCAN WAJAH</button>
                <button class="btn-main btn-admin-login" onclick="window.location.href='admin.html'">🔐 LOGIN ADMINISTRATOR</button>
            </div>
            <div class="school-footer">SD Negeri Ranca Tales<br>"Mindful, Joyful, and Meaningful"</div>
        </div>
    </div>

    <div id="scan-section">
        <button class="btn-back" onclick="location.reload()">⬅ KEMBALI KE MENU</button>
        <div id="container">
            <video id="video" autoplay muted playsinline></video>
        </div>
        <div id="status-box">
            <div id="loader" style="color: #2980b9; font-weight: bold;">Menyiapkan AI...</div>
            <div id="info" style="font-weight:bold; font-size:1.1em; margin-top:5px;"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');
        const info = document.getElementById('info');
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwTDUsSarnUUVADzQTqleRr82x9z9xyTQxV3fap1E621CzCoCU3F0sCPUEhDwd-RnLr/exec"; 

        let studentNames = {}, studentStatus = {}, faceMatcher, isProcessing = false;

        function bicara(teks) {
            window.speechSynthesis.cancel(); 
            const pesan = new SpeechSynthesisUtterance(teks);
            pesan.lang = "id-ID";
            pesan.rate = 1.0;
            window.speechSynthesis.speak(pesan);
        }

        function showScan() {
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('scan-section').style.display = 'block';
            init();
        }

        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.onloadedmetadata = () => { loadStudentData(); };
        }

        async function loadStudentData() {
            loader.innerText = "Sinkronisasi Database...";
            const response = await fetch(URL_GAS + "?t=" + new Date().getTime());
            const students = await response.json();

            const descriptors = await Promise.all(students.map(async s => {
                studentNames[s.nisn] = s.nama;
                studentStatus[s.nisn] = s.statusHariIni;
                if (!s.foto) return null;
                try {
                    const img = await faceapi.fetchImage(s.foto);
                    const desc = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                    return desc ? new faceapi.LabeledFaceDescriptors(s.nisn.toString(), [desc.descriptor]) : null;
                } catch (e) { return null; }
            }));

            faceMatcher = new faceapi.FaceMatcher(descriptors.filter(d => d !== null), 0.45);
            loader.innerText = "SISTEM SIAP! SILAKAN ABSEN";
            startRecognition();
        }

        function startRecognition() {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('container').append(canvas);
            const size = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, size);

            setInterval(async () => {
                const det = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (det) {
                    const res = faceapi.resizeResults(det, size);
                    const match = faceMatcher.findBestMatch(det.descriptor);
                    const nisn = match.label;

                    if (nisn !== 'unknown' && match.distance < 0.45) {
                        const nama = studentNames[nisn]; 
                        const status = studentStatus[nisn];
                        const box = res.detection.box;

                        // Tentukan warna (Hijau untuk baru absen, Merah untuk sudah)
                        const warna = status === "Sudah Absen" ? 'red' : '#2ecc71';
                        const label = status === "Sudah Absen" ? nama + " (SUDAH)" : nama;

                        // 1. Gambar Kotak Wajah
                        ctx.strokeStyle = warna;
                        ctx.lineWidth = 3;
                        ctx.strokeRect(box.x, box.y, box.width, box.height);

                        // 2. TRIK AGAR TULISAN TIDAK TERBALIK
                        ctx.save(); // Simpan settingan awal
                        ctx.scale(-1, 1); // Balikkan koordinat khusus untuk teks
                        
                        ctx.font = "bold 18px Segoe UI";
                        ctx.fillStyle = warna;
                        
                        // Karena koordinat dibalik, posisi X tulisan harus dihitung ulang
                        // Kita letakkan teks di atas kotak wajah
                        ctx.fillText(label, -box.x - box.width, box.y - 10);
                        
                        ctx.restore(); // Kembalikan koordinat ke settingan awal mirror

                        if (status === "Sudah Absen") {
                            if (!isProcessing) {
                                isProcessing = true;
                                bicara("Sudah absen hari ini, tolong gantian.");
                                setTimeout(() => { isProcessing = false; }, 3500);
                            }
                        } else {
                            if (!isProcessing) prosesAbsensi(nisn, nama);
                        }
                    } else {
                        // Kondisi Tidak Dikenal
                        ctx.strokeStyle = "orange";
                        ctx.lineWidth = 3;
                        ctx.strokeRect(res.detection.box.x, res.detection.box.y, res.detection.box.width, res.detection.box.height);
                        
                        ctx.save();
                        ctx.scale(-1, 1);
                        ctx.fillStyle = "orange";
                        ctx.font = "bold 18px Segoe UI";
                        ctx.fillText("TIDAK DIKENAL", -res.detection.box.x - res.detection.box.width, res.detection.box.y - 10);
                        ctx.restore();

                        if (!isProcessing) {
                            isProcessing = true;
                            bicara("Wajah tidak dikenali, anda siapa ya?");
                            setTimeout(() => { isProcessing = false; }, 4000);
                        }
                    }
                }
            }, 400);
        }

        function prosesAbsensi(nisn, nama) {
            isProcessing = true;
            bicara("Absen berhasil, selamat datang.");
            info.innerHTML = `<span style="color:green">✅ ABSEN BERHASIL: ${nama}</span>`;
            studentStatus[nisn] = "Sudah Absen";
            fetch(URL_GAS, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nisn: nisn }) });
            setTimeout(() => { isProcessing = false; info.innerText = ""; }, 3000);
        }
    </script>
</body>
</html>
