<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin SDNRT</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #2980b9; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Input Izin / Sakit</h3>
        <select id="studentSelect"><option>Memuat data...</option></select>
        <select id="statusSelect"><option value="S">Sakit (S)</option><option value="I">Izin (I)</option></select>
        <button id="btn" onclick="submit()">SIMPAN DATA</button>
        <button style="background:#e74c3c" onclick="window.location.href='index.html'">KEMBALI</button>
    </div>
    <script>
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwTDUsSarnUUVADzQTqleRr82x9z9xyTQxV3fap1E621CzCoCU3F0sCPUEhDwd-RnLr/exec";
        async function load() {
            const r = await fetch(URL_GAS + "?t=" + new Date().getTime());
            const s = await r.json();
            const sel = document.getElementById('studentSelect');
            sel.innerHTML = '<option value="">-- Pilih Murid --</option>';
            s.filter(x => x.statusHariIni === "Belum").forEach(x => {
                let o = document.createElement('option'); o.value = x.nisn; o.text = x.nama; sel.appendChild(o);
            });
        }
        async function submit() {
            const n = document.getElementById('studentSelect').value;
            const st = document.getElementById('statusSelect').value;
            if(!n) return alert("Pilih murid!");
            document.getElementById('btn').disabled = true;
            await fetch(URL_GAS, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nisn: n, status: st }) });
            alert("Berhasil!"); location.reload();
        }
        load();
    </script>
</body>
</html>
