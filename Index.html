<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Wajah SDNRT</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        #container { position: relative; border: 5px solid #333; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        canvas { position: absolute; top: 0; left: 0; }
        #status-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: white; width: 80%; max-width: 500px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loading { color: #e67e22; font-weight: bold; }
        .ready { color: #27ae60; font-weight: bold; }
        .detected { color: #2980b9; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <h2>Presensi Wajah Murid</h2>
    
    <div id="container">
        <video id="video" width="640" height="480" autoplay muted></video>
    </div>

    <div id="status-box">
        <div id="loader" class="loading">Menyiapkan AI & Mengambil Data Murid...</div>
        <div id="info"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');
        const info = document.getElementById('info');
        
        // GANTI DENGAN URL WEB APP ANDA
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwTDUsSarnUUVADzQTqleRr82x9z9xyTQxV3fap1E621CzCoCU3F0sCPUEhDwd-RnLr/exec";

        let labeledFaceDescriptors = [];
        let faceMatcher;
        let isProcessing = false;

        // 1. Jalankan Kamera & Load Model AI
        async function init() {
            try {
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
                ]);

                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                
                loadStudentData();
            } catch (err) {
                loader.innerText = "Gagal memuat kamera/model: " + err;
            }
        }

        // 2. Ambil Data Murid dari Spreadsheet (doGet)
        async function loadStudentData() {
            loader.innerText = "Sinkronisasi Wajah Murid dari Database...";
            const response = await fetch(URL_GAS);
            const students = await response.json();

            labeledFaceDescriptors = await Promise.all(
                students.map(async (student) => {
                    try {
                        const img = await faceapi.fetchImage(student.foto);
                        const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        if (!detections) throw new Error(`Wajah tidak terbaca: ${student.nama}`);
                        return new faceapi.LabeledFaceDescriptors(student.nisn.toString(), [detections.descriptor]);
                    } catch (e) {
                        console.error(e);
                        return null;
                    }
                })
            );

            // Filter data yang berhasil di-load saja
            labeledFaceDescriptors = labeledFaceDescriptors.filter(d => d !== null);
            faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.6);
            
            loader.className = "ready";
            loader.innerText = "SISTEM SIAP! Silakan menghadap kamera.";
            startRecognition();
        }

        // 3. Deteksi Wajah Secara Real-time
        function startRecognition() {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('container').append(canvas);
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                resizedDetections.forEach(async (detection) => {
                    const result = faceMatcher.findBestMatch(detection.descriptor);
                    const label = result.toString();
                    
                    // Jika wajah dikenal (bukan unknown) dan tidak sedang mengirim data
                    if (!result.label.includes("unknown") && !isProcessing) {
                        const nisn = result.label;
                        prosesAbsensi(nisn);
                    }

                    new faceapi.draw.DrawBox(detection.detection.box, { label }).draw(canvas);
                });
            }, 1000);
        }

        // 4. Kirim ke Google Sheets (doPost)
        async function prosesAbsensi(nisn) {
            isProcessing = true;
            info.innerHTML = `<span class="detected">Mengenali NISN: ${nisn}...</span>`;

            try {
                await fetch(URL_GAS, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ nisn: nisn })
                });

                info.innerHTML = `<span class="ready">Absen Berhasil Dicatat!</span>`;
                // Jeda 5 detik agar tidak absen berkali-kali
                setTimeout(() => { 
                    isProcessing = false; 
                    info.innerHTML = "";
                }, 5000);

            } catch (err) {
                isProcessing = false;
                info.innerText = "Gagal mengirim data.";
            }
        }

        init();
    </script>
</body>
</html>
